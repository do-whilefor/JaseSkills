version: scope-v1
allowed_roots: [.]
denied_roots: [.git, node_modules, vendor, evidence, outputs]
excluded_extensions: [.png, .zip, .db]
max_file_size: 2000000
symlink_policy: no_follow
network_policy:
  default: deny
  allowed_hosts: [127.0.0.1, localhost]
destructive_action_blocklist: ["DROP TABLE", "rm -rf", "DELETE FROM"]
secret_redaction_policy:
  enabled: true
  fail_on_unredacted_secret: true
evidence_retention_policy:
  raw_dir: evidence/raw
  sanitized_dir: evidence/sanitized
  report_may_reference_raw: false
