id: 27-cicd_secret_supply_chain
title: CI/CD secret 泄露与供应链风险
policy: local_authorized_non_destructive_only
status: needs_review
required_evidence:
  - source_file_line
  - route_handler_auth_graph
  - positive_control
  - negative_control
  - har_or_request_response
  - role_tenant_matrix
blocked_if:
  - target_not_local_authorized
  - destructive_state_change_required
  - no_negative_control_available
  - no_runtime_evidence_available
