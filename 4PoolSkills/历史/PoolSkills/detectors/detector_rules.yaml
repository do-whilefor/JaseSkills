version: detector-rules-v1
policy: static_signals_never_confirmed_without_dynamic_evidence
rules:
  - id: auth_bypass
    title: Authentication bypass candidate
    severity_candidate: high
    source_patterns: [authn]
    sink_patterns: [route]
    file_patterns: [permitAll, AllowAnonymous, auth:\s*false, skipAuth, public:\s*true]
    requires_role_tenant: false
  - id: authz_bypass
    title: Authorization bypass candidate
    severity_candidate: high
    file_patterns: [authorize, permission, role, policy, guard, can\(]
    requires_role_tenant: true
  - id: idor_bola
    title: IDOR/BOLA candidate
    severity_candidate: high
    file_patterns: [params\.id, userId, orgId, tenantId, findUnique, findById, PathVariable]
    requires_role_tenant: true
  - id: tenant_isolation
    title: Tenant isolation failure candidate
    severity_candidate: critical
    file_patterns: [tenantId, orgId, workspaceId, x-tenant, subdomain]
    requires_role_tenant: true
  - id: horizontal_privilege_escalation
    title: Horizontal privilege escalation candidate
    severity_candidate: high
    file_patterns: [ownerId, userId, accountId, memberId]
    requires_role_tenant: true
  - id: vertical_privilege_escalation
    title: Vertical privilege escalation candidate
    severity_candidate: high
    file_patterns: [isAdmin, role, roles, permissions, update\(.*role]
    requires_role_tenant: true
  - id: ssrf
    title: SSRF candidate
    severity_candidate: high
    sink_patterns: [ssrf_http_client]
    file_patterns: [fetch\(, axios, requests\.get, http\.Get, RestTemplate, imageProxy, webhook, callbackUrl]
    requires_role_tenant: false
  - id: rce
    title: RCE candidate
    severity_candidate: critical
    sink_patterns: [eval_vm, command_execution]
    file_patterns: [eval\(, new Function, vm\.runIn, Runtime\.getRuntime]
    requires_role_tenant: false
  - id: command_injection
    title: Command injection candidate
    severity_candidate: critical
    sink_patterns: [command_execution]
    file_patterns: [exec\(, spawn\(, shell_exec, system\(, ProcessBuilder]
    requires_role_tenant: false
  - id: sql_nosql_injection
    title: SQL/NoSQL injection candidate
    severity_candidate: high
    sink_patterns: [sql_or_nosql_query]
    file_patterns: [queryRaw, executeRaw, whereRaw, createNativeQuery, \$where, raw\(]
    requires_role_tenant: false
  - id: template_injection
    title: Template injection candidate
    severity_candidate: high
    sink_patterns: [template_render]
    file_patterns: [render_template_string, from_string, Twig, Velocity, Freemarker]
    requires_role_tenant: false
  - id: deserialization
    title: Deserialization candidate
    severity_candidate: critical
    sink_patterns: [deserialization]
    file_patterns: [pickle\.loads, yaml\.load, ObjectInputStream, unserialize, Marshal\.load]
    requires_role_tenant: false
  - id: arbitrary_file_read
    title: Arbitrary file read candidate
    severity_candidate: high
    sink_patterns: [file_read_write]
    file_patterns: [readFile, sendFile, File\.read, open\(, Files\.read]
    requires_role_tenant: false
  - id: arbitrary_file_write
    title: Arbitrary file write candidate
    severity_candidate: high
    sink_patterns: [file_read_write]
    file_patterns: [writeFile, move_uploaded_file, Files\.write, File\.write]
    requires_role_tenant: false
  - id: path_traversal
    title: Path traversal candidate
    severity_candidate: high
    file_patterns: [\.\./, path\.join, sendFile, normalize\(, filepath]
    requires_role_tenant: false
  - id: open_redirect
    title: Open redirect candidate
    severity_candidate: medium
    sink_patterns: [redirect]
    file_patterns: [redirect_uri, nextUrl, returnUrl, res\.redirect, RedirectResponse]
    requires_role_tenant: false
  - id: oauth_sso_jwt_logic
    title: OAuth/SSO/JWT logic candidate
    severity_candidate: high
    file_patterns: [redirect_uri, nonce, state, jwt, alg, kid, aud, iss]
    requires_role_tenant: false
  - id: webhook_signature_bypass
    title: Webhook signature bypass candidate
    severity_candidate: high
    file_patterns: [webhook, signature, hmac, stripe-signature, x-hub-signature]
    requires_role_tenant: false
  - id: graphql_authz
    title: GraphQL authorization candidate
    severity_candidate: high
    file_patterns: [GraphQL, resolver, fragment, introspection, mutation, query]
    requires_role_tenant: true
  - id: websocket_authz
    title: WebSocket authorization candidate
    severity_candidate: high
    file_patterns: [WebSocket, socket\.io, subscribe, channel, emit\(]
    requires_role_tenant: true
  - id: cache_poisoning
    title: Cache poisoning candidate
    severity_candidate: medium
    file_patterns: [Cache-Control, Vary, cacheKey, CDN, revalidate]
    requires_role_tenant: false
  - id: request_smuggling_risk
    title: Request smuggling risk candidate
    severity_candidate: medium
    file_patterns: [Transfer-Encoding, Content-Length, reverse_proxy, proxy_pass]
    requires_role_tenant: false
  - id: race_condition
    title: Race condition candidate
    severity_candidate: high
    file_patterns: [balance, quota, inventory, lock, transaction, concurrent]
    requires_role_tenant: false
  - id: business_logic
    title: Business logic bypass candidate
    severity_candidate: high
    file_patterns: [coupon, discount, refund, approval, status, state, workflow, order]
    requires_role_tenant: false
  - id: payment_points_coupon_logic
    title: Payment/points/coupon logic candidate
    severity_candidate: high
    file_patterns: [price, coupon, discount, points, balance, credit, subscription]
    requires_role_tenant: false
  - id: file_upload_chain
    title: File upload chain candidate
    severity_candidate: high
    file_patterns: [multer, multipart, upload, move_uploaded_file, ActiveStorage]
    requires_role_tenant: false
  - id: cors_csrf_combo
    title: CORS/CSRF high-risk combination candidate
    severity_candidate: medium
    file_patterns: [Access-Control-Allow-Origin, credentials, csrf, SameSite]
    requires_role_tenant: false
  - id: supply_chain
    title: Supply chain risk candidate
    severity_candidate: high
    file_patterns: [postinstall, preinstall, plugin, loadPlugin, build\.rs]
    requires_role_tenant: false
  - id: dependency_confusion
    title: Dependency confusion candidate
    severity_candidate: medium
    file_patterns: [registry, npmrc, pip\.conf, extra-index-url, publishConfig]
    requires_role_tenant: false
  - id: cicd_leak_abuse
    title: CI/CD leak or abuse candidate
    severity_candidate: high
    file_patterns: [GITHUB_TOKEN, secrets\., workflow_dispatch, pull_request_target]
    requires_role_tenant: false
  - id: secret_leak
    title: Secret leak candidate
    severity_candidate: high
    file_patterns: [api_key, secret, password, token, private_key]
    requires_role_tenant: false
  - id: cloud_config_error
    title: Cloud config error candidate
    severity_candidate: high
    file_patterns: [0\.0\.0\.0/0, public-read, privileged:\s*true, hostPath]
    requires_role_tenant: false
  - id: ssrf_metadata_simulation
    title: SSRF to metadata risk candidate
    severity_candidate: critical
    file_patterns: [169\.254\.169\.254, metadata, IMDS, web_identity_token]
    requires_role_tenant: false
  - id: admin_exposure
    title: Admin exposure candidate
    severity_candidate: high
    file_patterns: [admin, actuator, swagger, debug, internal]
    requires_role_tenant: true
  - id: debug_dev_endpoint
    title: Debug/dev endpoint exposure candidate
    severity_candidate: medium
    file_patterns: [debug, devMode, trace, testOnly, staging]
    requires_role_tenant: false
  - id: frontend_backend_param_diff
    title: Frontend/backend parameter mismatch candidate
    severity_candidate: high
    file_patterns: [disabled, hidden, tenantId, role, isAdmin]
    requires_role_tenant: true
  - id: mass_assignment
    title: Mass assignment candidate
    severity_candidate: high
    file_patterns: [Object\.assign, request\.all, req\.body, fill\(, guarded, fillable, update\(]
    requires_role_tenant: true
  - id: prototype_pollution
    title: Prototype pollution candidate
    severity_candidate: high
    file_patterns: [__proto__, constructor\.prototype, merge\(, lodash\.merge]
    requires_role_tenant: false
  - id: electron_extension_service_worker
    title: Electron/extension/service-worker attack surface candidate
    severity_candidate: high
    file_patterns: [contextBridge, ipcRenderer, chrome\.runtime, serviceWorker, manifest_version]
    requires_role_tenant: false
  - id: api_version_shadow_endpoint
    title: API version shadow endpoint candidate
    severity_candidate: medium
    file_patterns: [/v1/, /v2/, legacy, deprecated, beta]
    requires_role_tenant: true
