schema_version: package-schema
purpose: "JS collection and audit coverage contract. This file distinguishes implementation levels from documentation claims."
levels:
  level_0: "documentation only"
  level_1: "grep/regex candidates"
  level_2: "JS file enumeration and endpoint extraction"
  level_3: "AST parsing and framework recognition"
  level_4: "source map/chunk lineage/wrapper resolver"
  level_5: "dynamic browser capture plus role matrix"
  level_6: "source-sink-dataflow plus auth/tenant-aware detector"
  level_7: "evidence loop plus replay plus quality gate plus dashboard"
current_level_after_repair: "level_2_plus_partial_level_3_guarded"
reason: "The repaired package adds JS asset enumeration, line-bound endpoint extraction, sourceMappingURL/chunk/import hints, browser-storage runtime script, backend availability checks, fixtures, and dashboard. It does not honestly claim full AST/dataflow/role-matrix automation unless dependencies and runtime are verified locally."
coverage:
  html_script_collection:
    status: "implemented"
    script: "scripts/js-asset-audit.py"
    evidence_fields: ["source_file", "line", "script_src", "inline_script_hash"]
  dynamic_chunk_collection:
    status: "implemented_candidate"
    script: "scripts/js-asset-audit.py"
    evidence_fields: ["dynamic_import", "chunk_name", "source_file", "line"]
  bundler_detection:
    status: "implemented_candidate"
    signatures: ["webpack", "vite", "rollup", "parcel", "next", "nuxt", "angular", "react", "vue"]
  sourcemap_discovery:
    status: "implemented_candidate_no_download_by_default"
    evidence_fields: ["sourceMappingURL", "map_file_candidate"]
  service_worker_manifest_precache:
    status: "implemented_candidate"
    evidence_fields: ["service_worker_registration", "manifest_link", "precache_entry"]
  ast_parser_backends:
    status: "availability_checked_not_assumed"
    script: "scripts/parser-backend-check.py"
    supported_checks: ["node", "npm", "typescript", "babel_parser", "acorn", "esprima", "tree_sitter_python", "python_ast"]
  endpoint_extraction:
    status: "implemented_candidate"
    wrappers: ["fetch", "axios", "XMLHttpRequest", "graphql", "WebSocket", "EventSource", "Apollo", "Relay", "urql"]
  auth_call_extraction:
    status: "implemented_candidate"
    patterns: ["Authorization", "Bearer", "X-CSRF", "csrf", "apiKey", "withCredentials", "credentials"]
  parameter_source_tracking:
    status: "implemented_candidate_not_full_dataflow"
    sources: ["location", "URLSearchParams", "localStorage", "sessionStorage", "IndexedDB", "postMessage", "route params", "form input"]
  source_sink_dataflow:
    status: "not_fully_implemented"
    gate: "Do not promote findings as dataflow-proven without parser backend plus tests."
  runtime_capture:
    status: "optional_if_playwright_available_and_authorized"
    script: "scripts/browser-storage-collect-playwright.mjs"
  evidence_binding:
    status: "implemented_schema_contract_partial_runtime"
    required_fields: ["asset_id", "source_file", "line", "function_or_wrapper", "page_url", "role", "request_sample", "response_sample", "dynamic_status"]
  edge_js_entries:
    status: "implemented_candidate"
    entries: ["extension manifest", "electron preload", "Capacitor/Cordova", "Tauri", "PWA", "Sentry artifact hint", "asset-manifest", "build-manifest", "NEXT_DATA", "Nuxt payload", "Remix manifest"]

current_additions:
  manifest_expander:
    status: "implemented_local_artifact_level"
    script: "scripts/js-manifest-expander.py"
    test: "tests/test_js_manifest_expander.py"
    covers: ["asset-manifest.json", "build-manifest.json", "service-worker", "workbox/precache hints", "map/js asset references"]
  normalized_detector_routing:
    status: "implemented_candidate_routing_level"
    script: "scripts/info-surface-normalizer.py"
    schema: "schemas/info-surface.schema.json"
    test: "tests/test_info_surface_normalizer.py"
    limitation: "Not AST dataflow. It routes evidence fields into severe-vulnerability entry categories only."
