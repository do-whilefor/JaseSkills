schema_version: hidden-info-rules.v1
purpose: "Candidate-level hidden information collection rules for authorized local repositories only."
safety:
  network: disabled
  destructive_actions: forbidden
  raw_secret_output: forbidden
  default_status: static_candidate_needs_dynamic_validation
rules:
  - id: HID-01
    type: comment_hidden_security_hint
    collect: ["API names", "old domains", "token variable names", "test account hints", "deprecated routes"]
    promote_only_if: "runtime evidence + expected visibility analysis + QG pass"
  - id: HID-02
    type: source_map_original_source
    collect: ["original source paths", "sourcesContent endpoint literals", "internal variable names"]
    promote_only_if: "source map is present in authorized deployment artifact and dynamic access is validated"
  - id: HID-03
    type: frontend_hidden_artifact
    collect: ["minified JS endpoints", "feature flags", "lazy chunks", "service worker cache", "web manifest paths"]
    promote_only_if: "artifact is served by authorized target and endpoint behavior is validated safely"
  - id: HID-04
    type: deployment_hidden_context
    collect: ["CI/CD secret names", "registry names", "Docker/K8s internal services", "Terraform cloud assets"]
    promote_only_if: "non-sensitive metadata exposure is confirmed and business impact is established"
  - id: HID-05
    type: identity_boundary_hint
    collect: ["roles", "tenants", "default seed users", "OAuth redirect_uri", "CORS/trusted origins"]
    promote_only_if: "role/tenant matrix or configuration evidence proves non-expected visibility"
  - id: HID-06
    type: protocol_surface_hint
    collect: ["GraphQL operations", "WebSocket event names", "gRPC proto services", "Postman/OpenAPI hidden endpoints"]
    promote_only_if: "authorized runtime validation confirms reachable surface and QG gates pass"
