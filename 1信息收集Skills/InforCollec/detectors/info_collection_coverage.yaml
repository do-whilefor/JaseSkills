schema_version: package-schema
purpose: "Coverage map for authorized information collection. This file is a coverage contract, not proof of execution."
authorization_boundary:
  allowed: ["local repository", "localhost", "127.0.0.1", "authorized container network", "explicitly provided lab/target"]
  forbidden: ["unapproved third-party targets", "destructive probing", "secret exfiltration", "persistence", "credential theft"]
coverage:
  project_structure:
    expected_outputs: ["language", "framework", "entry_file", "route_file", "controller", "service", "model", "middleware", "static_asset", "build_artifact"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/route-artifact-extract.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_code_surface_inventory.py"]
  technology_stack:
    expected_outputs: ["frontend_framework", "backend_framework", "orm", "template_engine", "auth_library", "queue", "cache", "object_storage", "database", "graphql", "rpc", "websocket"]
    scripts: ["scripts/code-surface-inventory.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_code_surface_inventory.py"]
  exposure_surface:
    expected_outputs: ["http_route", "api_endpoint", "graphql_resolver", "websocket_event", "rpc_method", "cli_command", "cron_job", "webhook", "admin_panel", "debug_endpoint", "health_endpoint", "metrics_endpoint", "upload_download_endpoint"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/js-asset-audit.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_js_asset_audit.py", "tests/test_code_surface_inventory.py"]
  parameter_collection:
    expected_outputs: ["path_param", "query_param", "body_param", "header", "cookie", "jwt_claim", "graphql_variable", "multipart_field", "filename_param", "redirect_url", "callback_url", "template_name", "object_key", "tenant_id", "user_id", "role_id"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/js-asset-audit.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_js_asset_audit.py"]
  auth_and_permission_context:
    expected_outputs: ["login_flow", "registration_flow", "password_reset", "oauth_oidc_saml", "jwt", "session", "cookie", "csrf", "api_key", "signature", "rbac_abac_acl", "tenant_context", "role_matrix"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/runtime-readiness-check.py"]
    status: "implemented_candidate_level_plus_manual_required"
    tests: ["tests/test_code_surface_inventory.py"]
  data_assets:
    expected_outputs: ["user", "order", "organization", "tenant", "file", "billing", "key", "token", "log", "backup", "export", "report", "audit_record"]
    scripts: ["scripts/code-surface-inventory.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_code_surface_inventory.py"]
  configuration_risks:
    expected_outputs: ["debug", "cors", "cookie_flags", "jwt_secret", "default_password", "test_config", "dev_endpoint", "unauthenticated_admin", "object_storage", "reverse_proxy"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/local-runtime-inventory.sh", "scripts/deployment-readonly-inventory.sh"]
    status: "implemented_candidate_level"
    tests: ["tests/test_code_surface_inventory.py"]
  dependency_risks:
    expected_outputs: ["manifest", "lock_file", "dangerous_library", "deprecated_library", "cve_candidate", "framework_security_default_change"]
    scripts: ["scripts/code-surface-inventory.py", "scripts/package-artifact-readonly-inventory.py"]
    status: "implemented_inventory_level_no_online_cve_lookup"
    tests: ["tests/test_code_surface_inventory.py"]
  runtime_evidence:
    expected_outputs: ["har", "request_summary", "response_summary", "screenshot", "log", "startup_args", "env_keys", "docker_compose", "k8s_manifest", "nginx_config"]
    scripts: ["scripts/runtime-readiness-check.py", "scripts/exposure-probe-safe.sh", "scripts/browser-storage-collect-playwright.mjs"]
    status: "partially_implemented_requires_authorized_runtime"
    tests: ["tests/test_runtime_readiness_check.py"]
  hidden_entries:
    expected_outputs: ["robots", "sitemap", "manifest", "service_worker", "source_map", "runtime_chunk", "next_data_route", "vite_manifest", "openapi", "swagger", "postman", "graphql_introspection_candidate", "protobuf", "wsdl"]
    scripts: ["scripts/js-asset-audit.py", "scripts/code-surface-inventory.py"]
    status: "implemented_candidate_level"
    tests: ["tests/test_js_asset_audit.py"]
  edgecase_collection:
    expected_outputs: ["error_page_leak", "stack_trace", "build_comment", "chunk_name", "feature_flag", "ab_test", "lazy_route", "browser_cache", "prefetch_preload", "import_map", "service_worker_cache", "indexeddb", "electron_preload", "mobile_deep_link", "update_manifest"]
    scripts: ["scripts/js-asset-audit.py", "scripts/browser-storage-collect-playwright.mjs"]
    status: "partially_implemented_static_plus_browser_optional"
    tests: ["tests/test_js_asset_audit.py"]
normalization_required_fields: ["asset_id", "type", "source_file", "line", "value", "evidence_status", "dynamic_status", "auth_context", "tenant_context", "redaction_status"]

current_bindings:
  config_dependency_inventory:
    script: "scripts/config-dependency-inventory.py"
    tests: ["tests/test_config_dependency_inventory.py"]
    outputs: ["dependency_entry", "dependency_script_candidate", "configuration_file", "debug_enabled", "cors_candidate", "jwt_oauth_candidate", "object_storage_candidate", "reverse_proxy_surface", "ci_artifact_secret_risk", "feature_flag_candidate"]
    limitation: "No package registry lookup and no CVE confirmation; outputs inventory/risk candidates only."
  js_manifest_expansion:
    script: "scripts/js-manifest-expander.py"
    tests: ["tests/test_js_manifest_expander.py"]
    outputs: ["frontend_manifest_asset", "js_asset_from_manifest_or_worker", "service_worker_cache_hint", "service_worker_or_precache_file"]
    limitation: "Does not download CDN/history artifacts; local artifacts only."
  normalized_info_surface:
    schema: "schemas/info-surface.schema.json"
    script: "scripts/info-surface-normalizer.py"
    tests: ["tests/test_info_surface_normalizer.py"]
    required_outputs: ["asset_id", "source_file", "source_line", "source_type", "surface_type", "endpoint", "parameter", "auth_context", "role_context", "tenant_context", "candidate_vulnerability", "detector_route", "report_template", "review_status", "confidence"]
    limitation: "Maps severe-vulnerability entry signals; confirmation still requires runtime evidence, role/tenant matrix, QG and human review."

  hidden_information_miner:
    script: "scripts/hidden-info-miner.py"
    tests: ["tests/test_hidden_info_miner.py"]
    rules: ["rules/hidden-info-collection-rules.yaml"]
    templates: ["templates/hidden-info-evidence.md"]
    outputs:
      - comment_hidden_security_hint
      - source_map_reference
      - source_map_original_source
      - source_map_endpoint_literal
      - minified_js_hidden_api
      - graphql_operation_name
      - websocket_event_name
      - service_worker_cache_or_route_hint
      - manifest_path_or_asset
      - feature_flag_or_experiment
      - cicd_deployment_or_secret_name_hint
      - container_iac_internal_service_hint
      - cloud_or_third_party_service_hint
      - test_seed_default_account_or_role
      - package_script_hidden_command
      - reverse_proxy_hidden_path
      - well_known_public_path_file
      - environment_variant_config
    limitation: "Read-only static candidate miner; no network, no vulnerability confirmation, no raw secret output."
  api_spec_inventory:
    script: "scripts/api-spec-inventory.py"
    tests: ["tests/test_api_spec_inventory.py"]
    templates: ["templates/api-spec-inventory.md"]
    outputs:
      - openapi_path_operation
      - openapi_yaml_path_operation
      - postman_request
      - graphql_schema_type
      - graphql_operation
      - graphql_field_with_args
      - grpc_service
      - grpc_rpc_method
    limitation: "Static spec inventory only; YAML parser is best-effort and runtime reachability requires 04 validation."
  coverage_audit:
    script: "scripts/surface-coverage-audit.py"
    tests: ["tests/test_surface_coverage_audit.py"]
    rules: ["rules/information-collection-coverage-rules.yaml"]
    templates: ["templates/info-collection-audit-report.md"]
    outputs: ["40_dimension_status", "evidence_files", "tests", "signals_found", "failure_scenario", "required_fix"]
    limitation: "Audits Skill package/file bindings and optional JSONL signals; does not prove a target project has been fully collected."
